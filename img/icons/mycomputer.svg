<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Win98 My Computer icon -->
  <!-- Monitor -->
  <rect x="6" y="4" width="36" height="28" fill="#c0c0c0" stroke="#000" stroke-width="2"/>
  <!-- Screen -->
  <rect x="10" y="8" width="28" height="18" fill="#000080"/>
  <!-- Screen content -->
  <rect x="14" y="12" width="8" height="8" fill="#fff"/>
  <rect x="26" y="12" width="8" height="8" fill="#ffcc00"/>
  <rect x="14" y="22" width="20" height="2" fill="#008080"/>
  <!-- Monitor base -->
  <rect x="16" y="32" width="16" height="4" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  <rect x="12" y="36" width="24" height="4" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  <!-- Power LED -->
  <circle cx="36" cy="30" r="2" fill="#00ff00"/>
</svg>
