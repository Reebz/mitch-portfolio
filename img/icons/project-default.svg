<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Win98 application/program icon -->
  <!-- Window frame -->
  <rect x="4" y="4" width="40" height="40" fill="#c0c0c0" stroke="#000" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="6" y="6" width="36" height="8" fill="#000080"/>
  <!-- Title bar buttons -->
  <rect x="32" y="8" width="4" height="4" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  <rect x="37" y="8" width="4" height="4" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  <!-- Content area -->
  <rect x="6" y="16" width="36" height="26" fill="#fff"/>
  <!-- Code lines -->
  <rect x="10" y="20" width="12" height="2" fill="#000080"/>
  <rect x="10" y="24" width="20" height="2" fill="#808080"/>
  <rect x="14" y="28" width="16" height="2" fill="#008080"/>
  <rect x="14" y="32" width="10" height="2" fill="#808080"/>
  <rect x="10" y="36" width="8" height="2" fill="#000080"/>
  <!-- Gear accent -->
  <circle cx="36" cy="36" r="5" fill="none" stroke="#808080" stroke-width="2"/>
  <circle cx="36" cy="36" r="2" fill="#808080"/>
</svg>
