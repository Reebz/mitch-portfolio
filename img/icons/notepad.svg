<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Win98 Notepad icon -->
  <rect x="8" y="4" width="28" height="36" fill="#fff" stroke="#000" stroke-width="2"/>
  <rect x="10" y="2" width="28" height="36" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- Blue header bar -->
  <rect x="10" y="2" width="28" height="6" fill="#000080"/>
  <!-- Text lines -->
  <line x1="14" y1="14" x2="34" y2="14" stroke="#000" stroke-width="1"/>
  <line x1="14" y1="18" x2="30" y2="18" stroke="#000" stroke-width="1"/>
  <line x1="14" y1="22" x2="32" y2="22" stroke="#000" stroke-width="1"/>
  <line x1="14" y1="26" x2="28" y2="26" stroke="#000" stroke-width="1"/>
  <line x1="14" y1="30" x2="34" y2="30" stroke="#000" stroke-width="1"/>
  <!-- Pencil -->
  <rect x="32" y="28" width="12" height="4" fill="#ffcc00" transform="rotate(-45 38 30)"/>
  <polygon points="30,38 28,42 32,40" fill="#ffcc00"/>
  <polygon points="28,42 27,44 30,42" fill="#000"/>
</svg>
