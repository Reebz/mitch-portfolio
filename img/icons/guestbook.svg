<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Win98 address book / guestbook icon -->
  <!-- Book body -->
  <rect x="6" y="6" width="32" height="36" fill="#c0a060" stroke="#000" stroke-width="2"/>
  <!-- Book spine -->
  <rect x="6" y="6" width="6" height="36" fill="#a08040"/>
  <!-- Pages -->
  <rect x="14" y="10" width="20" height="28" fill="#fff" stroke="#808080" stroke-width="1"/>
  <!-- Page lines -->
  <line x1="16" y1="16" x2="32" y2="16" stroke="#c0c0c0" stroke-width="1"/>
  <line x1="16" y1="20" x2="32" y2="20" stroke="#c0c0c0" stroke-width="1"/>
  <line x1="16" y1="24" x2="32" y2="24" stroke="#c0c0c0" stroke-width="1"/>
  <line x1="16" y1="28" x2="32" y2="28" stroke="#c0c0c0" stroke-width="1"/>
  <line x1="16" y1="32" x2="32" y2="32" stroke="#c0c0c0" stroke-width="1"/>
  <!-- Pen -->
  <rect x="34" y="14" width="3" height="20" fill="#000080" rx="1"/>
  <rect x="34" y="10" width="3" height="4" fill="#c0c0c0"/>
  <polygon points="34,34 35.5,38 37,34" fill="#000080"/>
</svg>
