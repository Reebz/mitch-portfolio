<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Sky gradient - muted pale blue like the original Win98 Clouds -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8ebd"/>
      <stop offset="40%" stop-color="#6ba3cc"/>
      <stop offset="70%" stop-color="#89b8d8"/>
      <stop offset="100%" stop-color="#a7cce4"/>
    </linearGradient>
    <!-- Cloud shapes with soft edges -->
    <filter id="cloud-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
    <filter id="cloud-blur-sm">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Cloud layer 1 - large background clouds -->
  <g filter="url(#cloud-blur)" opacity="0.6">
    <ellipse cx="300" cy="650" rx="350" ry="120" fill="#d8e8f0"/>
    <ellipse cx="200" cy="620" rx="250" ry="100" fill="#e0edf4"/>
    <ellipse cx="450" cy="670" rx="200" ry="90" fill="#dae9f1"/>

    <ellipse cx="1100" cy="400" rx="400" ry="140" fill="#d5e6ee"/>
    <ellipse cx="1000" cy="370" rx="300" ry="110" fill="#dfe efb"/>
    <ellipse cx="1250" cy="420" rx="250" ry="100" fill="#d8e8f0"/>

    <ellipse cx="1650" cy="750" rx="350" ry="130" fill="#d3e4ec"/>
    <ellipse cx="1550" cy="720" rx="280" ry="110" fill="#dbe9f2"/>
    <ellipse cx="1800" cy="770" rx="220" ry="90" fill="#d8e8f0"/>
  </g>

  <!-- Cloud layer 2 - brighter mid-ground clouds -->
  <g filter="url(#cloud-blur)" opacity="0.75">
    <ellipse cx="600" cy="500" rx="300" ry="110" fill="#e8f0f5"/>
    <ellipse cx="500" cy="470" rx="220" ry="90" fill="#eef4f8"/>
    <ellipse cx="720" cy="520" rx="200" ry="80" fill="#e5eef4"/>

    <ellipse cx="1500" cy="300" rx="320" ry="120" fill="#e8f0f5"/>
    <ellipse cx="1400" cy="270" rx="240" ry="95" fill="#edf3f7"/>
    <ellipse cx="1620" cy="320" rx="200" ry="85" fill="#e5eef4"/>
  </g>

  <!-- Cloud layer 3 - bright foreground clouds -->
  <g filter="url(#cloud-blur-sm)" opacity="0.85">
    <ellipse cx="150" cy="350" rx="280" ry="100" fill="#f0f5f8"/>
    <ellipse cx="80" cy="320" rx="200" ry="80" fill="#f5f9fb"/>
    <ellipse cx="300" cy="370" rx="180" ry="70" fill="#eef4f7"/>

    <ellipse cx="900" cy="600" rx="350" ry="120" fill="#f0f5f8"/>
    <ellipse cx="800" cy="570" rx="260" ry="95" fill="#f5f9fb"/>
    <ellipse cx="1050" cy="620" rx="220" ry="85" fill="#eef4f7"/>

    <ellipse cx="1750" cy="500" rx="250" ry="95" fill="#f0f5f8"/>
    <ellipse cx="1680" cy="475" rx="190" ry="75" fill="#f5f9fb"/>
    <ellipse cx="1870" cy="520" rx="160" ry="65" fill="#eef4f7"/>
  </g>

  <!-- Cloud layer 4 - small accent wisps -->
  <g filter="url(#cloud-blur-sm)" opacity="0.5">
    <ellipse cx="450" cy="200" rx="150" ry="50" fill="#e0ecf2"/>
    <ellipse cx="1300" cy="150" rx="180" ry="55" fill="#dde9f0"/>
    <ellipse cx="800" cy="800" rx="200" ry="60" fill="#e0ecf2"/>
    <ellipse cx="1600" cy="850" rx="170" ry="50" fill="#dde9f0"/>
  </g>
</svg>
